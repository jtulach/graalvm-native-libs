name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        java: [ '25' ]
        os: [ ubuntu-24.04, macos-14 ] 
        # windows-2022 disabled because of 
        # https://github.com/jtulach/graalvm-native-libs/pull/3#issuecomment-4585601488

    steps:
    - uses: actions/checkout@v4
    - name: Set up GraalVM 25
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java }}
        distribution: 'graalvm'
        cache: maven
    - name: Build
      run: mvn -B install --file pom.xml

    - name: Build Native
      run: mvn -Pnative -B package --file pom.xml

    - name: Generate Javadoc
      run: mvn javadoc:jar

