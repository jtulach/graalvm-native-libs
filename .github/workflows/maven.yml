name: Dynamic Loading with Maven

on:
  push:
    branches: [ "master", "DynamicLoading" ]
  pull_request:
    branches: [ "master", "DynamicLoading" ]
  workflow_dispatch:

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        java: [ '25' ]
        os: [ ubuntu-24.04 ] 

    steps:
    - uses: actions/checkout@v4
    - name: Set up GraalVM 25
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java }}
        distribution: 'graalvm'
        cache: maven
    - name: Build
      run: mvn -B install --file pom.xml

    - name: Build Native
      run: mvn -Pnative -B package --file pom.xml

    - name: Exec without class loading
      run: mvn -q -Pnative exec:exec

    - name: Exec with class loading
      run: mvn -q -Pnative exec:exec@load-print-class

